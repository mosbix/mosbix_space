<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mosbix Space</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #f4f4f5);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #888888);
            --btn: var(--tg-theme-button-color, #3390ec);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #ffffff);
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            user-select: none;
        }

        .header { display: flex; align-items: center; margin-bottom: 20px; gap: 10px; }
        .back-btn { 
            background: none; border: none; color: var(--btn); 
            font-size: 16px; font-weight: bold; cursor: pointer; display: none;
        }

        .card {
            background-color: var(--sec-bg);
            border-radius: 15px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.1s;
        }
        .card:active { transform: scale(0.98); }

        .info { flex-grow: 1; }
        .name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .desc { font-size: 13px; color: var(--hint); }

        .btn-action {
            background-color: var(--btn); color: var(--btn-text);
            border: none; border-radius: 10px; padding: 8px 15px;
            font-weight: bold; font-size: 14px;
        }
        .btn-action.selected { background-color: #ff3b30; }

        .counter {
            background-color: var(--sec-bg); border-radius: 15px;
            padding: 15px; display: flex; justify-content: space-between;
            align-items: center; margin-top: 20px;
        }
        .count-controls { display: flex; align-items: center; gap: 15px; }
        .circle-btn {
            width: 30px; height: 30px; border-radius: 50%;
            background-color: var(--btn); color: var(--btn-text);
            border: none; font-size: 20px; display: flex;
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <button id="back-btn" class="back-btn" onclick="goBack()">← Назад</button>
        <h2 id="title" style="margin:0">Мои заведения</h2>
    </div>

    <div id="app-content">
        <div style="text-align: center; padding-top: 50px;">Загрузка...</div>
    </div>

    <div id="footer-controls" style="display: none;">
        <div class="counter">
            <span style="font-weight: 600;">Количество человек:</span>
            <div class="count-controls">
                <button class="circle-btn" onclick="updatePeople(-1)">-</button>
                <span id="p-count" style="font-size: 18px; font-weight: bold;">1</span>
                <button class="circle-btn" onclick="updatePeople(1)">+</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = "https://hematozoic-lankly-demetra.ngrok-free.dev"; // ЗАМЕНИ ЭТО ПЕРЕД ЗАПУСКОМ!
        
        tg.expand();

        let view = 'objects'; 
        let history = []; // Для навигации назад
        let selected = { biz: null, branch: null, cat: null };
        let cart = [];
        let people = 1;

        // 1. ЗАГРУЗКА ДАННЫХ С СЕРВЕРА
        async function fetchData(path) {
            try {
                const res = await fetch(`${API_URL}/api${path}`);
                return await res.json();
            } catch (e) {
                console.error("Ошибка API:", e);
                return null;
            }
        }

        // 2. ГЛАВНАЯ ФУНКЦИЯ ОТРИСОВКИ
        async function render() {
            const content = document.getElementById('app-content');
            const title = document.getElementById('title');
            const backBtn = document.getElementById('back-btn');
            const footer = document.getElementById('footer-controls');

            content.innerHTML = '';
            backBtn.style.display = (view === 'objects') ? 'none' : 'block';
            footer.style.display = (view === 'services') ? 'block' : 'none';

            if (view === 'objects') {
                title.innerText = "Мои заведения";
                const tg_id = tg.initDataUnsafe.user?.id || 0;
                const objects = await fetchData(`/get_my_businesses/${tg_id}`);
                
                if (!objects || objects.length === 0) {
                    content.innerHTML = "<p style='text-align:center'>У вас пока нет заведений. Отсканируйте QR-код!</p>";
                    return;
                }

                objects.forEach(obj => {
                    createCard(content, obj.name, obj.type, () => {
                        selected.biz = obj;
                        history.push('objects');
                        view = 'branches';
                        render();
                    });
                });
            } 
            else if (view === 'branches') {
                title.innerText = selected.biz.name;
                const details = await fetchData(`/get_business_details/${selected.biz.id}`);
                selected.full_data = details; // Сохраняем в память

                details.branches.forEach(br => {
                    createCard(content, br.name, br.address, () => {
                        selected.branch = br;
                        history.push('branches');
                        view = 'categories';
                        render();
                    });
                });
            }
            else if (view === 'categories') {
                title.innerText = "Категории";
                selected.full_data.categories.forEach(cat => {
                    createCard(content, cat.name, "", () => {
                        selected.cat = cat;
                        history.push('categories');
                        view = 'services';
                        render();
                    });
                });
            }
            else if (view === 'services') {
                title.innerText = selected.cat.name;
                selected.cat.services.forEach(srv => {
                    const isSelected = cart.some(i => i.id === srv.id);
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="info">
                            <div class="name">${srv.name}</div>
                            <div class="desc">${srv.price.toLocaleString()} сум • ${srv.duration_minutes} мин</div>
                        </div>
                        <button class="btn-action ${isSelected ? 'selected' : ''}" onclick="toggleCart(${srv.id}, ${srv.price})">
                            ${isSelected ? 'Убрать' : 'Добавить'}
                        </button>`;
                    content.appendChild(div);
                });
                updateMainButton();
            }
        }

        // ХЕЛПЕРЫ
        function createCard(parent, n, d, action) {
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = action;
            div.innerHTML = `<div class="info"><div class="name">${n}</div><div class="desc">${d}</div></div><div style="color:var(--btn)">❯</div>`;
            parent.appendChild(div);
        }

        function toggleCart(id, price) {
            const idx = cart.findIndex(i => i.id === id);
            if (idx > -1) cart.splice(idx, 1);
            else cart.push({id, price});
            render();
        }

        function updatePeople(val) {
            if (people + val >= 1 && people + val <= 5) {
                people += val;
                document.getElementById('p-count').innerText = people;
                updateMainButton();
            }
        }

        function updateMainButton() {
            const total = cart.reduce((a, b) => a + b.price, 0) * people;
            if (total > 0) {
                tg.MainButton.text = `ВЫБРАТЬ ВРЕМЯ • ${total.toLocaleString()} сум`;
                tg.MainButton.show();
            } else tg.MainButton.hide();
        }

        function goBack() {
            view = history.pop();
            tg.MainButton.hide();
            render();
        }

        tg.MainButton.onClick(() => {
            tg.showConfirm(`Записать ${people} чел. на сумму ${cart.reduce((a, b) => a + b.price, 0) * people} сум?`);
        });

        // Запуск
        render();
    </script>
</body>
</html>
