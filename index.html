<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mosbix Space</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            margin: 0; padding: 16px; box-sizing: border-box;
        }
        .header-nav { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; }
        .back-btn {
            background: none; border: none; color: var(--tg-theme-button-color, #3390ec);
            font-size: 16px; cursor: pointer; padding: 5px 0; font-weight: bold;
        }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 12px; padding: 16px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer;
        }
        .info-block { flex-grow: 1; }
        .name { font-size: 16px; font-weight: 600; }
        .details { font-size: 13px; color: var(--tg-theme-hint-color, #888888); }
        .badge { color: var(--tg-theme-button-color); font-weight: bold; }
        
        /* Стили корзины */
        .toggle-btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 8px; padding: 8px 12px; font-weight: bold;
        }
        .toggle-btn.selected { background-color: var(--tg-theme-destructive-text-color, #ff3b30); }
        .counter-box {
            background-color: var(--tg-theme-secondary-bg-color);
            border-radius: 12px; padding: 16px; margin-top: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <div class="header-nav" id="nav-bar" style="display: none;">
        <button class="back-btn" onclick="goBack()">← Назад</button>
    </div>

    <h2 id="page-title">Мои заведения</h2>
    <div id="content-list"></div>

    <div id="people-box" class="counter-box" style="display: none;">
        <span>Количество человек:</span>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="toggle-btn" onclick="changePeople(-1)">-</button>
            <b id="people-count">1</b>
            <button class="toggle-btn" onclick="changePeople(1)">+</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = 'objects'; 
        let selObj = null, selBranch = null, selCat = null;
        let cart = [];
        let people = 1;

        // --- ДАННЫЕ (Позже заменим на запрос к базе) ---
        const data = [
            {
                id: 1, name: "Стоматология Улыбка", type: "Клиника",
                branches: [{ id: 10, name: "Юнусабад", addr: "4-й квартал" }, { id: 11, name: "Чиланзар", addr: "9-й квартал" }],
                categories: [
                    { id: 100, name: "🦷 Терапия", services: [{id: 1, name: "Осмотр", price: 50000}, {id: 2, name: "Лечение", price: 150000}] },
                    { id: 101, name: "💎 Чистка", services: [{id: 3, name: "Ультразвук", price: 200000}] }
                ]
            },
            {
                id: 2, name: "Mosbix Barbershop", type: "Салон",
                branches: [{ id: 20, name: "Центр", addr: "ул. Навои" }],
                categories: [{ id: 200, name: "✂️ Стрижки", services: [{id: 4, name: "Стрижка", price: 80000}] }]
            }
        ];

        function render() {
            const list = document.getElementById('content-list');
            const title = document.getElementById('page-title');
            const nav = document.getElementById('nav-bar');
            const pBox = document.getElementById('people-box');
            list.innerHTML = '';
            
            nav.style.display = (state === 'objects') ? 'none' : 'flex';
            pBox.style.display = (state === 'services') ? 'flex' : 'none';

            if (state === 'objects') {
                title.innerText = "Мои заведения";
                data.forEach(o => addCard(o.name, o.type, () => { selObj = o; state = 'branches'; render(); }));
            } 
            else if (state === 'branches') {
                title.innerText = selObj.name;
                selObj.branches.forEach(b => addCard(b.name, b.addr, () => { selBranch = b; state = 'categories'; render(); }));
            }
            else if (state === 'categories') {
                title.innerText = "Категории";
                selObj.categories.forEach(c => addCard(c.name, "", () => { selCat = c; state = 'services'; render(); }));
            }
            else if (state === 'services') {
                title.innerText = selCat.name;
                selCat.services.forEach(s => addServiceCard(s, list));
                updateMainButton();
            }
        }

        function addCard(n, d, action) {
            const list = document.getElementById('content-list');
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = action;
            div.innerHTML = `<div class="info-block"><div class="name">${n}</div><div class="details">${d}</div></div><div class="badge">❯</div>`;
            list.appendChild(div);
        }

        function addServiceCard(s, list) {
            const isSel = cart.some(item => item.id === s.id);
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="info-block"><div class="name">${s.name}</div><div class="details">${s.price.toLocaleString()} сум</div></div>
                <button class="toggle-btn ${isSel ? 'selected' : ''}" onclick="toggleSrv(${s.id}, ${s.price})">
                    ${isSel ? 'Убрать' : 'Добавить'}
                </button>`;
            list.appendChild(div);
        }

        function toggleSrv(id, price) {
            const idx = cart.findIndex(i => i.id === id);
            if (idx > -1) cart.splice(idx, 1); else cart.push({id, price});
            render();
        }

        function changePeople(d) {
            if (people + d >= 1 && people + d <= 5) { people += d; document.getElementById('people-count').innerText = people; updateMainButton(); }
        }

        function updateMainButton() {
            let sum = cart.reduce((a, b) => a + b.price, 0) * people;
            if (sum > 0) { tg.MainButton.text = `ВЫБРАТЬ ВРЕМЯ • ${sum.toLocaleString()} сум`; tg.MainButton.show(); }
            else tg.MainButton.hide();
        }

        function goBack() {
            tg.MainButton.hide();
            if (state === 'services') state = 'categories';
            else if (state === 'categories') state = 'branches';
            else if (state === 'branches') state = 'objects';
            render();
        }

        tg.MainButton.onClick(() => {
            // Здесь будет переход к выбору Мастера и Даты
            tg.showConfirm(`Вы выбрали услуг на ${cart.reduce((a, b) => a + b.price, 0) * people} сум. Перейти к выбору мастера?`);
        });

        render();
    </script>
</body>
</html>
