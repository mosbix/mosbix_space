<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mosbix Space - Онлайн Запись</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        h1, h2 { margin-top: 0; }

        .service-card {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #e5e5ea;
        }

        .service-info { flex-grow: 1; }
        .service-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .service-price { font-size: 14px; color: var(--tg-theme-hint-color, #888888); }

        .toggle-btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .toggle-btn.selected {
            background-color: var(--tg-theme-destructive-text-color, #ff3b30);
        }

        .people-counter {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e5e5ea;
        }

        .counter-controls { display: flex; align-items: center; gap: 12px; }

        .counter-btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
        }
        
        /* Блок для показа суммы в обычном браузере (вне Telegram) */
        #browser-cart {
            display: none;
            margin-top: 20px;
            padding: 16px;
            background-color: #3390ec;
            color: white;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2 id="business-title">Загрузка заведения...</h2>
    <p>Выберите нужные услуги:</p>

    <div id="services-container"></div>

    <div class="people-counter">
        <span style="font-weight: 600;">Количество человек:</span>
        <div class="counter-controls">
            <button class="counter-btn" onclick="changePeople(-1)">-</button>
            <span id="people-count" style="font-weight: bold; font-size: 18px;">1</span>
            <button class="counter-btn" onclick="changePeople(1)">+</button>
        </div>
    </div>
    
    <div id="browser-cart" onclick="alert('В Telegram это будет большая кнопка внизу экрана!')">
        Итого: 0 сум
    </div>

    <script>
        // БЕЗОПАСНАЯ ИНИЦИАЛИЗАЦИЯ (Работает и в Telegram, и в браузере)
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        
        if (tg && tg.initData) {
            try { tg.expand(); } catch(e) {}
        }

        let selectedServices = [];
        let totalSum = 0;
        let peopleCount = 1;

        // ВРЕМЕННЫЕ ДАННЫЕ
        const fakeData = {
            businessName: "Стоматология Улыбка",
            services: [
                { id: 1, name: "Первичный осмотр", price: 50000, duration: 30 },
                { id: 2, name: "Лечение кариеса", price: 150000, duration: 60 },
                { id: 3, name: "Профессиональная чистка", price: 200000, duration: 40 }
            ]
        };

        // Отрисовка страницы
        document.getElementById('business-title').innerText = fakeData.businessName;
        renderServices();

        function renderServices() {
            const container = document.getElementById('services-container');
            container.innerHTML = '';

            fakeData.services.forEach(service => {
                const isSelected = selectedServices.some(s => s.id === service.id);
                const card = document.createElement('div');
                card.className = 'service-card';
                card.innerHTML = `
                    <div class="service-info">
                        <div class="service-name">${service.name}</div>
                        <div class="service-price">${service.price.toLocaleString('ru-RU')} сум • ⏱ ${service.duration} мин</div>
                    </div>
                    <button class="toggle-btn ${isSelected ? 'selected' : ''}" 
                            onclick="toggleService(${service.id}, ${service.price})">
                        ${isSelected ? 'Убрать' : 'Добавить'}
                    </button>
                `;
                container.appendChild(card);
            });
        }

        function toggleService(id, price) {
            const index = selectedServices.findIndex(s => s.id === id);
            if (index > -1) {
                selectedServices.splice(index, 1);
            } else {
                selectedServices.push({ id, price });
            }
            updateCart();
            renderServices(); 
        }

        function changePeople(delta) {
            let newCount = peopleCount + delta;
            if (newCount >= 1 && newCount <= 5) {
                peopleCount = newCount;
                document.getElementById('people-count').innerText = peopleCount;
                updateCart();
            }
        }

        function updateCart() {
            totalSum = selectedServices.reduce((sum, service) => sum + service.price, 0) * peopleCount;

            // Если мы внутри Telegram — используем родную красивую кнопку
            if (tg && tg.initData && tg.MainButton) {
                if (totalSum > 0) {
                    tg.MainButton.text = `ПРОДОЛЖИТЬ • ${totalSum.toLocaleString('ru-RU')} сум`;
                    tg.MainButton.show();
                } else {
                    tg.MainButton.hide();
                }
            } else {
                // Если мы в обычном браузере — показываем обычную HTML кнопку
                const browserBtn = document.getElementById('browser-cart');
                if (totalSum > 0) {
                    browserBtn.style.display = 'block';
                    browserBtn.innerText = `ПРОДОЛЖИТЬ • ${totalSum.toLocaleString('ru-RU')} сум`;
                } else {
                    browserBtn.style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
